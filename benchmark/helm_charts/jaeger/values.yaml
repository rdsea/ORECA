provisionDataStore:
  cassandra: false
  elasticsearch: true
storage:
  type: elasticsearch
collector:
  enabled: true
  service:
    otlp:
      grpc:
        name: otlp-grpc
        port: 4317
      http:
        name: otlp-http
        port: 4318

query:
  basePath: /jaeger

elasticsearch:
  persistence:
    enabled: true
    storageClass: longhorn
    accessModes: ["ReadWriteOnce"]
    size: 100gb
