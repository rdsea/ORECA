apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-kafka-adapter
  labels:
    app: prometheus-kafka-adapter
  # namespace: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-kafka-adapter
  template:
    metadata:
      labels:
        app: prometheus-kafka-adapter
    spec:
      containers:
        - name: adapter
          image: telefonica/prometheus-kafka-adapter:1.9.1
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BROKER_LIST
              value: "redpanda-0.redpanda.redpanda.svc.cluster.local:9093"
            - name: KAFKA_TOPIC
              value: "prometheus-metric" # Change to your topic
            - name: LOG_LEVEL
              value: "info"
            - name: KAFKA_SECURITY_PROTOCOL
              value: "SASL_PLAINTEXT"
            - name: KAFKA_SASL_MECHANISM
              value: "SCRAM-SHA-256"
            - name: KAFKA_SASL_USERNAME
              value: "alice"
            - name: KAFKA_SASL_PASSWORD
              value: "redpanda"
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-kafka-adapter
  # namespace: redpanda
spec:
  selector:
    app: prometheus-kafka-adapter
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
