apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-kafka-adapter
  labels:
    app: prometheus-kafka-adapter
  namespace: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-kafka-adapter
  template:
    metadata:
      labels:
        app: prometheus-kafka-adapter
    spec:
      containers:
        - name: adapter
          image: telefonica/prometheus-kafka-adapter:1.9.1
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BROKER_LIST
              value: "redpanda-0.redpanda.redpanda.svc.cluster.local:9093"
            - name: KAFKA_TOPIC
              value: "prometheus-metric" # Change to your topic
            - name: LOG_LEVEL
              value: "info"
            - name: KAFKA_SECURITY_PROTOCOL
              value: "SASL_SSL"
            - name: KAFKA_SASL_MECHANISM
              value: "PLAIN"
            - name: KAFKA_SASL_USERNAME
              value: "alice"
            - name: KAFKA_SASL_PASSWORD
              value: "redpanda"
            - name: KAFKA_SSL_CA_CERT_FILE
              value: "/etc/tls/certs/ca.crt"
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/tls/certs
              readOnly: true
      volumes:
        - name: tls-certs
          secret:
            secretName: redpanda-default-cert
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-kafka-adapter
  namespace: redpanda
spec:
  selector:
    app: prometheus-kafka-adapter
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
