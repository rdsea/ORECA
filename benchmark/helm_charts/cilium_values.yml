kubeProxyReplacement: true

gatewayAPI:
  enabled: true

prometheus:
  enabled: true

operator:
  prometheus:
    enabled: true

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
    baseUrl: "/hubble"
  metrics:
    enableOpenMetrics: true
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - http
      # - httpV2:
      #     exemplars: true
      #     labelsContext:
      #       - source_ip
      #       - source_namespace
      #       - source_workload
      #       - destination_ip
      #       - destination_namespace
      #       - destination_workload
      #       - traffic_direction
