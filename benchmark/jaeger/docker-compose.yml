version: "3.8"

services:
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
      - CASSANDRA_CLUSTER_NAME=jaeger-cluster
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 5

  cassandra-schema:
    image: jaegertracing/jaeger-cassandra-schema:1.57
    depends_on:
      cassandra:
        condition: service_healthy
    environment:
      - CASSANDRA_SERVERS=cassandra
    entrypoint: ["sh", "-c", "sleep 10 && /cassandra-schema/create.sh"]

  jaeger-collector:
    image: jaegertracing/jaeger-collector:1.57
    ports:
      - "14250:14250" # gRPC
      - "14268:14268" # HTTP
    environment:
      - SPAN_STORAGE_TYPE=cassandra
      - CASSANDRA_SERVERS=cassandra
    depends_on:
      - cassandra-schema

  jaeger-query:
    image: jaegertracing/jaeger-query:1.57
    container_name: jaeger-query
    ports:
      - "16686:16686"
    environment:
      - SPAN_STORAGE_TYPE=cassandra
      - CASSANDRA_SERVERS=cassandra
    depends_on:
      - jaeger-collector

  jaeger-agent:
    image: jaegertracing/jaeger-agent:1.57
    ports:
      - "6831:6831/udp"
      - "6832:6832/udp"
    command: ["--reporter.grpc.host-port=jaeger-collector:14250"]
    depends_on:
      - jaeger-collector

volumes:
  cassandra_data:
